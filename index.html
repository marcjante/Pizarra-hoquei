<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Hoquei Patines Palau-Solità i Plegamants</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-header">
  <div class="logo">HP</div>
  <div>
    <h1>Hoquei Patines Palau-Solità i Plegamants</h1>
  </div>
</div>

<main>

<div class="field-card">
<div id="rink-container">
  <svg id="rink-svg" width="100%" height="100%" viewBox="0 0 500 720" preserveAspectRatio="none">
    <rect x="0" y="0" width="500" height="720" rx="18" fill="#141414"/>
    <rect x="14" y="14" width="472" height="692" rx="10" fill="#e8a05a"/>
    <rect x="14" y="14" width="472" height="692" rx="10" fill="none" stroke="#f5efe2" stroke-width="3"/>
    <line x1="30" y1="360" x2="470" y2="360" stroke="#f5efe2" stroke-width="3"/>
    <circle cx="250" cy="360" r="58" fill="none" stroke="#f5efe2" stroke-width="3"/>
    <circle cx="250" cy="360" r="3" fill="#f5efe2"/>
    <rect x="155" y="48" width="190" height="100" fill="#f0c419" stroke="#141414" stroke-width="2.5"/>
    <circle cx="250" cy="188" r="3" fill="#f5efe2"/>
    <circle cx="250" cy="223" r="3" fill="#f5efe2"/>
    <path d="M223,55 L223,37 L277,37 L277,55" fill="none" stroke="#141414" stroke-width="2.5"/>
    <path d="M223,55 A27,27 0 0,0 277,55" fill="none" stroke="#141414" stroke-width="2.5"/>
    <rect x="155" y="572" width="190" height="100" fill="#f0c419" stroke="#141414" stroke-width="2.5"/>
    <circle cx="250" cy="532" r="3" fill="#f5efe2"/>
    <circle cx="250" cy="497" r="3" fill="#f5efe2"/>
    <path d="M223,665 L223,683 L277,683 L277,665" fill="none" stroke="#141414" stroke-width="2.5"/>
    <path d="M223,665 A27,27 0 0,1 277,665" fill="none" stroke="#141414" stroke-width="2.5"/>
  </svg>
  <canvas id="draw-canvas"></canvas>
  <div id="token-layer"></div>
</div>
</div>

<div class="dock">
  <div class="dock-row">
    <button id="mode-move" class="icon-btn active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3"/><path d="M9 5l3-3 3 3"/><path d="M15 19l-3 3-3-3"/><path d="M19 9l3 3-3 3"/><path d="M2 12h20"/><path d="M12 2v20"/></svg>
      Mover
    </button>
    <button id="mode-draw" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></svg>
      Dibujar
    </button>
    <button id="play-anim" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Play
    </button>
    <button id="undo-draw" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
      Deshacer
    </button>
    <button id="redo-draw" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9h-10.5a5.5 5.5 0 0 0 0 11H13"/></svg>
      Rehacer
    </button>
    <button id="clear-draw" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H8l-6-6a2 2 0 0 1 0-2.8l8-8a2 2 0 0 1 2.8 0l7 7a2 2 0 0 1 0 2.8L13 20"/><path d="M6 12l7 7"/></svg>
      Borrar
    </button>
    <button id="clear-players" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      Jugadores
    </button>
  </div>

  <div class="dock-row">
    <button id="add-red" class="icon-btn"><span class="dot" style="background:#e5484d;"></span>Rojo</button>
    <button id="add-blue" class="icon-btn"><span class="dot" style="background:#3b82f6;"></span>Azul</button>
    <button id="add-gk" class="icon-btn"><span class="dot" style="background:#f0c419;"></span>Portero</button>
    <button id="add-ball" class="icon-btn"><span class="dot" style="background:#f5efe2;width:14px;height:14px;"></span>Bola</button>

    <button id="tool-solid" class="icon-btn active" style="width:72px;height:auto;min-height:56px;font-size:8.8px;">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="20" x2="20" y2="4"/></svg>
      Jugador
    </button>
    <button id="tool-dotted" class="icon-btn" style="width:72px;height:auto;min-height:56px;font-size:8.8px;">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1.5 5"><line x1="4" y1="20" x2="20" y2="4"/></svg>
      Sin balón
    </button>
    <button id="tool-dashed" class="icon-btn" style="width:72px;height:auto;min-height:56px;font-size:8.8px;">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="5 4"><line x1="4" y1="20" x2="20" y2="4"/></svg>
      Movimiento
    </button>
    <button id="tool-triangle" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4l9 16H3z"/></svg>
      Triángulo
    </button>
    <button id="tool-circle" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg>
      Círculo
    </button>
    <button id="tool-text" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      Texto
    </button>

    <button class="icon-btn" style="pointer-events:none;">
      <span class="swatch"><input type="color" id="pen-color" value="#27ae60" style="width:100%;height:100%;pointer-events:auto;"></span>
      Color
    </button>

    <button id="save-jpg" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
      JPG
    </button>
    <button id="save-video" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="15" height="14" rx="2"/><path d="M17 10l5-3v10l-5-3"/></svg>
      Vídeo
    </button>
  </div>
</div>

<div id="video-result">
  <video id="video-preview" controls playsinline style="width:100%;border-radius:10px;background:#000;"></video>
  <a id="video-download" href="#" style="display:block;margin-top:10px;background:var(--accent);color:#04170b;font-weight:700;text-decoration:none;padding:10px;border-radius:10px;font-size:13px;">Guardar vídeo</a>
  <p style="color:var(--text-dim);font-size:11px;margin:8px 0 0;">Si no se descarga solo, mantén pulsado el vídeo y elige "Guardar".</p>
</div>
</main>
<script src="script.js"></script>
</body>
</html>
